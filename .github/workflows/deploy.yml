name: Deploy Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: cd app && npm install

      - name: Run tests
        run: cd app && npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.vars.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set image tag
        id: vars
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ECR_REPOSITORY_URL }}:${{ steps.vars.outputs.sha }} ./app
          docker push ${{ secrets.ECR_REPOSITORY_URL }}:${{ steps.vars.outputs.sha }}

  terraform:
    runs-on: ubuntu-latest
    needs: build
    outputs:
      ec2_ip: ${{ steps.tf_output.outputs.ec2_ip }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform init
        run: cd terraform && terraform init

      - name: Terraform apply
        run: cd terraform && terraform apply -auto-approve -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      - name: Get EC2 IP
        id: tf_output
        run: |
          echo "ec2_ip=$(cd terraform && terraform output -raw ec2_public_ip)" >> $GITHUB_OUTPUT

  deploy:
    runs-on: ubuntu-latest
    needs: [build, terraform]
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ needs.terraform.outputs.ec2_ip }}
          username: ec2-user
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY_URL }}
            docker pull ${{ secrets.ECR_REPOSITORY_URL }}:${{ needs.build.outputs.image_tag }}
            docker stop app || true
            docker rm app || true
            docker run -d \
              --name app \
              --restart unless-stopped \
              -p 3000:3000 \
              -e GIT_COMMIT_SHA=${{ needs.build.outputs.image_tag }} \
              ${{ secrets.ECR_REPOSITORY_URL }}:${{ needs.build.outputs.image_tag }}

  health-check:
    runs-on: ubuntu-latest
    needs: [build, deploy, terraform]
    steps:
      - name: Wait for application to start
        run: sleep 15

      - name: Check application health
        run: |
          for i in 1 2 3 4 5; do
            echo "Health check attempt $i"
            response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ needs.terraform.outputs.ec2_ip }}:3000/health)
            if [ "$response" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi
            echo "Got $response, waiting 10 seconds"
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

      - name: Notify success
        run: |
          echo "Deployment successful"
          echo "Commit: ${{ needs.build.outputs.image_tag }}"
          echo "Server: ${{ needs.terraform.outputs.ec2_ip }}"